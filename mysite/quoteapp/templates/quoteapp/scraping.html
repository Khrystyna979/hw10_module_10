{% extends "quoteapp/base.html" %}

{% block content %}
<div class="container text-center mt-5">
    <h2>Scraping quotes</h2>
    <p class="text-muted">Click the button below to update the database with current quotes from the site <a href="https://quotes.toscrape.com/">Quotes.toscrape.com</a></p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">
            🚀 Start page scraping
        </button>
    </form>
</div>
{% endblock %}
