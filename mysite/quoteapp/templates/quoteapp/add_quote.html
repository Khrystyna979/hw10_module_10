{% extends "quoteapp/base.html" %}

{% block content %}
<div class="container">
    <h3> Add a New Quote</h3>
    <form method="POST" action="{% url 'quoteapp:add_quote' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_quote">Quote text:</label>
            {{ form.quote }}
            <span>{{ form.errors.quote }}</span>
        </div>

        <div class="form-group">
            <label for="id_author">Select Author:</label>
            <div class="field-wrapper">
                {{ form.author }}
                <a href="{% url 'quoteapp:add_author' %}" target="_blank" class="add-link" title="Create new author">+ Add Author</a>
                <span>{{ form.errors.author }}</span>
            </div>
        </div>
        <div class="form-group">
            <label for="id_tags">Select Tags:</label>
            <div class="field-wrapper">
                {{ form.tags }}
                <a href="{% url 'quoteapp:add_tag' %}" target="_blank" class="add-link" title="Create new tag">+ Add Tag</a>
                <span>{{ form.errors.tags }}</span>
            </div>
        </div>

        <div class="buttons-group">
            <button type="submit" class="btn btn-primary">Save Quote</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
    </form>

{% endblock %}
